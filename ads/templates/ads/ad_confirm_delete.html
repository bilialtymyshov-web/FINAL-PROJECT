<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Удаление объявления — ClassiFyi</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-0 shadow-sm p-4 text-center">
                    <h2 class="h4 fw-bold text-danger mb-3">Удалить объявление?</h2>
                    <p>Вы действительно хотите удалить объявление <strong>«{{ object.title }}»</strong>?</p>
                    <p class="text-muted small">Это действие нельзя будет отменить.</p>

                    <form method="post" class="mt-4">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger me-2">Да, удалить</button>
                        <a href="{% url 'ads:my_ads' %}" class="btn btn-secondary">Отмена</a>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
